<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Projektzentrum</title>
    <style>
        :root {
            --bg: #000000;
            --box: #0a0a0a;
            --border: #1a1a1a;
            --accent: #2ecc71;
            --admin: #9b59b6;
            --danger: #e74c3c;
            --text: #e0e0e0;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Consolas', monospace; margin: 0; padding: 20px;
            line-height: 1.5;
        }
        
        /* TOP BAR & PROFILE ICON */
        .top-bar { 
            display: flex; justify-content: flex-end; padding: 10px; 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; 
        }
        .profile-trigger { 
            width: 45px; height: 45px; background: #2980b9; color: white; 
            border-radius: 50%; display: none; align-items: center; 
            justify-content: center; cursor: pointer; border: 2px solid #fff;
            font-size: 1.2rem; font-weight: bold; box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .dropdown { 
            position: absolute; top: 65px; right: 10px; background: #111; 
            border: 1px solid #333; padding: 15px; width: 220px; display: none; 
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .page { display: none; max-width: 800px; margin: auto; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }
        .section { background: var(--box); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        
        h1, h2 { color: var(--accent); font-size: 1.1rem; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; margin-top: 0; }
        
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #333; 
            color: var(--accent); padding: 12px; margin: 10px 0; box-sizing: border-box; outline: none;
        }
        button { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px; cursor: pointer; width: 100%; text-transform: uppercase; 
            font-weight: bold; transition: 0.3s; margin-top: 5px;
        }
        button:hover { background: var(--accent); color: #000; }
        
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-admin { border-color: var(--admin); color: var(--admin); }

        .chat-box { height: 250px; overflow-y: auto; background: #050505; padding: 15px; border: 1px solid #222; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; font-size: 0.9rem; border-left: 3px solid #444; background: #080808; }
        .msg-admin { border-color: var(--admin); background: #120a1a; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; }
        .clickable-name { cursor: pointer; text-decoration: underline; color: #3498db; font-weight: bold; }
        
        .ban-item { padding: 15px; border: 1px solid #333; margin-bottom: 10px; cursor: pointer; }
        .ban-item:hover { border-color: var(--danger); background: #1a0505; }
    </style>
</head>
<body onclick="document.getElementById('profileDropdown').style.display='none'">

    <div class="top-bar">
        <div id="userProfile" class="profile-trigger" onclick="event.stopPropagation(); toggleDrop()">?</div>
        <div id="profileDropdown" class="dropdown">
            <strong id="dropName" style="display:block; font-size:1.1rem;">User</strong>
            <p id="dropTeamDisplay" style="font-size:0.75rem; color:#888; margin: 5px 0 15px 0;">Team: -</p>
            <hr style="border:0; border-top:1px solid #222; margin-bottom:15px;">
            <button onclick="showPage('pageChats')">Meine Chats</button>
            <button onclick="location.reload()" style="margin-top:10px; border-color:var(--danger); color:var(--danger)">Logout</button>
        </div>
    </div>

    <div id="pageLogin" class="page active">
        <div class="section">
            <h1>System Login</h1>
            <input type="text" id="loginUser" placeholder="Benutzername">
            <input type="password" id="loginPass" placeholder="Passwort">
            <button onclick="login()">Anmelden</button>
            <p style="font-size:0.8rem; text-align:center; margin-top:20px;">
                Kein Account? <a href="#" onclick="showPage('pageRegister')" style="color:var(--accent)">Hier registrieren</a>
            </p>
        </div>
    </div>

    <div id="pageRegister" class="page">
        <div class="section">
            <h1>Registrierung</h1>
            <input type="text" id="regUser" placeholder="Wunschname">
            <input type="password" id="regPass" placeholder="Passwort">
            <button onclick="register()">Konto erstellen</button>
            <button onclick="showPage('pageLogin')" style="border:none; color:#666;">Zurück zum Login</button>
        </div>
    </div>

    <div id="pageAdmin" class="page">
        <div class="section">
            <h1>Admin Zentrale</h1>
            <button class="btn-admin" onclick="showPage('pageAdminTools')">Admin Tools (Blacklist)</button>
        </div>
        <div class="section">
            <h2>Projekt-Regeln</h2>
            <textarea id="adminRegelnInput" rows="4"></textarea>
            <button onclick="saveRegeln()">Speichern</button>
        </div>
        <div class="section">
            <h2>Support Tickets</h2>
            <div id="adminOpenTickets"></div>
        </div>
        <div class="section">
            <h2>User-Liste (Klick für Kick/Ban)</h2>
            <div id="adminUserList"></div>
        </div>
    </div>

    <div id="pageAdminTools" class="page">
        <div class="section">
            <h1>Blacklist</h1>
            <div id="blacklistContainer"></div>
            <button onclick="showPage('pageAdmin')" style="margin-top:20px;">Zurück</button>
        </div>
    </div>

    <div id="pageUserManage" class="page">
        <div class="section">
            <h1>User Management</h1>
            <p>User: <strong id="manageTargetName" style="color:var(--accent)">-</strong></p>
            <button class="btn-danger" onclick="kickUser()">Kicken</button>
            <button class="btn-danger" style="background: #330000; margin-top:10px;" onclick="banUser()">Bannen</button>
            <button onclick="showPage('pageAdmin')" style="border:none; margin-top:20px;">Abbrechen</button>
        </div>
    </div>

    <div id="pagePlayer" class="page">
        <div class="section">
            <h1>Regeln</h1>
            <div id="displayRegeln" style="white-space: pre-wrap; color:#bbb;"></div>
        </div>
        <div class="section">
            <h1>Support-Ticket</h1>
            <textarea id="playerTicketText" placeholder="Wie können wir helfen?"></textarea>
            <button onclick="createTicket()">Absenden</button>
        </div>
    </div>

    <div id="pageChats" class="page">
        <div class="section">
            <h1>Deine Chats</h1>
            <div id="chatList"></div>
            <button onclick="goBack()" style="margin-top:20px;">Zurück</button>
        </div>
    </div>

    <div id="pageSingleChat" class="page">
        <div class="section">
            <h1 id="chatHeader">Chat</h1>
            <div id="chatContent" class="chat-box"></div>
            <input type="text" id="chatInput" placeholder="Nachricht...">
            <button onclick="sendMsg()">Senden</button>
            <button onclick="showPage('pageChats')" style="border:none;">Zurück</button>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
        let blacklist = JSON.parse(localStorage.getItem('blacklist')) || [];
        let regeln = localStorage.getItem('projektRegeln') || "Keine Regeln.";
        let currentUser = null;
        let activeChatId = null;
        let manageTarget = null;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            refreshUI();
        }

        function refreshUI() {
            if(currentUser && !currentUser.isAdmin && !users.find(u => u.name === currentUser.name)) {
                alert("Account nicht mehr aktiv."); location.reload();
            }
            document.getElementById('displayRegeln').innerText = regeln;
            if(currentUser?.isAdmin) {
                document.getElementById('adminRegelnInput').value = regeln;
                renderAdminUsers();
                renderAdminOpenTickets();
                renderBlacklist();
            }
            renderChatList();
        }

        function register() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            if(u.toLowerCase()==="admin" && !p) {
                const n = prompt("Admin PW:"); if(n) localStorage.setItem('adminPass', n); return;
            }
            if(blacklist.find(x => x.name === u)) { alert("Gebannt!"); return; }
            if(users.find(x => x.name === u)) { alert("Existiert bereits!"); return; }
            if(!u || !p) return;
            users.push({name: u, pass: p, team: "Kein Team"});
            saveAll(); showPage('pageLogin');
        }

        function login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const b = blacklist.find(x => x.name === u);
            if(b) { alert("GEBANNT! Grund: " + b.reason); return; }
            const apw = localStorage.getItem('adminPass') || "1234";
            if(u.toLowerCase()==="admin" && p===apw) {
                currentUser = {name: "Admin", isAdmin: true, team: "Leitung"};
                enterSystem("pageAdmin");
            } else {
                const f = users.find(x => x.name === u && x.pass === p);
                if(f) { currentUser = f; enterSystem("pagePlayer"); }
                else alert("Fehler!");
            }
        }

        function enterSystem(page) {
            showPage(page);
            const t = document.getElementById('userProfile');
            t.innerText = currentUser.name[0].toUpperCase();
            t.style.display = "flex";
            document.getElementById('dropName').innerText = currentUser.name;
            document.getElementById('dropTeamDisplay').innerText = "Team: " + (currentUser.team || "Keines");
        }

        function renderAdminUsers() {
            document.getElementById('adminUserList').innerHTML = users.map(u => `
                <div class="user-row">
                    <span class="clickable-name" onclick="openUserManage('${u.name}')">${u.name}</span>
                    <select onchange="updateTeam('${u.name}', this.value)" style="width:auto;">
                        <option value="Kein Team" ${u.team==='Kein Team'?'selected':''}>Kein Team</option>
                        <option value="Vulkan" ${u.team==='Vulkan'?'selected':''}>Vulkan</option>
                        <option value="Schloss" ${u.team==='Schloss'?'selected':''}>Schloss</option>
                    </select>
                </div>
            `).join("");
        }

        function openUserManage(n) { manageTarget = n; document.getElementById('manageTargetName').innerText = n; showPage('pageUserManage'); }
        function kickUser() { users = users.filter(u => u.name !== manageTarget); saveAll(); showPage('pageAdmin'); }
        function banUser() { 
            const r = prompt("Grund:"); if(!r) return;
            blacklist.push({name: manageTarget, reason: r});
            users = users.filter(u => u.name !== manageTarget);
            saveAll(); showPage('pageAdmin');
        }
        function renderBlacklist() {
            document.getElementById('blacklistContainer').innerHTML = blacklist.map(b => `<div class="ban-item" onclick="unbanUser('${b.name}')">${b.name} (Grund: ${b.reason})</div>`).join("") || "Leer";
        }
        function unbanUser(n) { if(confirm("Entbannen?")) { blacklist = blacklist.filter(x => x.name !== n); saveAll(); refreshUI(); } }
        function updateTeam(n, t) { users.find(x => x.name === n).team = t; saveAll(); enterSystem(currentUser.isAdmin?"pageAdmin":"pagePlayer"); }
        function saveRegeln() { regeln = document.getElementById('adminRegelnInput').value; localStorage.setItem('projektRegeln', regeln); alert("Saved!"); }
        function createTicket() {
            const t = document.getElementById('playerTicketText').value; if(!t) return;
            tickets.push({id: Date.now(), player: currentUser.name, msgs: [{s: currentUser.name, t: t}], claimedBy: ""});
            saveAll(); alert("Gesendet!");
        }
        function renderAdminOpenTickets() {
            document.getElementById('adminOpenTickets').innerHTML = tickets.filter(t => !t.claimedBy).map(t => `<div class="section"><strong>${t.player}:</strong> ${t.msgs[0].t} <button onclick="claimTicket(${t.id})">Annehmen</button></div>`).join("") || "Keine Tickets.";
        }
        function claimTicket(id) { tickets.find(x => x.id === id).claimedBy = "Admin"; saveAll(); openChat(id); }
        function renderChatList() {
            const my = currentUser?.isAdmin ? tickets.filter(t => t.claimedBy) : tickets.filter(t => t.player === currentUser?.name);
            document.getElementById('chatList').innerHTML = my.map(t => `<div class="section" onclick="openChat(${t.id})" style="cursor:pointer">Chat mit ${t.player}</div>`).join("") || "Keine Chats.";
        }
        function openChat(id) {
            activeChatId = id; showPage('pageSingleChat');
            const t = tickets.find(x => x.id === id);
            document.getElementById('chatHeader').innerText = "Chat mit " + t.player;
            document.getElementById('chatContent').innerHTML = t.msgs.map(m => `<div class="msg ${m.s === 'Admin' ? 'msg-admin' : ''}"><strong>${m.s}:</strong> ${m.t}</div>`).join("");
        }
        function sendMsg() {
            const i = document.getElementById('chatInput'); if(!i.value) return;
            const t = tickets.find(x => x.id === activeChatId);
            t.msgs.push({s: currentUser.name, t: i.value});
            saveAll(); i.value = ""; openChat(activeChatId);
        }
        function toggleDrop() { const d = document.getElementById('profileDropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function saveAll() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('tickets', JSON.stringify(tickets));
            localStorage.setItem('blacklist', JSON.stringify(blacklist));
        }
        function goBack() { showPage(currentUser.isAdmin ? 'pageAdmin' : 'pagePlayer'); }
    </script>
</body>
</html>
