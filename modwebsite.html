<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Projektzentrum</title>
    <style>
        :root {
            --bg-color: #000000;
            --section-bg: #0d0d0d;
            --border-color: #1a1a1a;
            --accent-color: #2ecc71;
            --admin-color: #9b59b6;
            --text-main: #e0e0e0;
        }

        body { 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Consolas', monospace;
            margin: 0; padding: 20px;
        }

        .top-bar {
            display: flex; justify-content: flex-end; padding: 15px;
            position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100;
        }

        .profile-trigger {
            width: 42px; height: 42px; background-color: #2980b9;
            color: white; border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-weight: bold;
            cursor: pointer; border: 1px solid #3498db;
        }

        .profile-dropdown {
            position: absolute; top: 65px; right: 15px;
            background: #111; border: 1px solid #333; padding: 20px;
            width: 220px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        .page { display: none; }
        .active { display: block; }

        .section { 
            background: var(--section-bg); padding: 25px; 
            border: 1px solid var(--border-color); margin: 20px auto; max-width: 700px;
        }

        input, textarea { 
            width: 100%; margin: 10px 0; padding: 12px; 
            background: #050505; border: 1px solid #222; color: #2ecc71;
            box-sizing: border-box; outline: none;
        }

        button { 
            background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color);
            padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
            transition: 0.3s; width: 100%; margin-top: 5px;
        }

        button:hover { background: var(--accent-color); color: black; }

        /* Chat Styles */
        .chat-container {
            max-height: 300px; overflow-y: auto; background: #050505;
            padding: 10px; border: 1px solid #222; margin-bottom: 10px;
        }

        .msg { margin-bottom: 10px; padding: 8px; border-radius: 4px; font-size: 0.85rem; }
        .msg-player { border-left: 3px solid var(--accent-color); background: #0a1a0a; }
        .msg-admin { border-left: 3px solid var(--admin-color); background: #150a1a; text-align: right; }

        .ticket-item {
            border: 1px solid #222; padding: 15px; margin-bottom: 10px; cursor: pointer;
        }
        .ticket-item:hover { border-color: var(--accent-color); }
    </style>
</head>
<body onclick="closeDropdown()">

    <div class="top-bar">
        <div id="userProfile" class="profile-trigger" onclick="toggleDropdown(event)">?</div>
        <div id="profileDropdown" class="profile-dropdown">
            <h4 id="dropName" style="margin:0">User</h4>
            <p id="dropTeam" style="color: #666; font-size: 0.8rem;">Team: -</p>
            <hr style="border:0; border-top:1px solid #222; margin: 15px 0;">
            <button onclick="showPage('pageChats')" style="margin-bottom: 10px;">Meine Chats</button>
            <button onclick="logout()" style="border-color: #e74c3c; color: #e74c3c;">Logout</button>
        </div>
    </div>

    <div id="pageLogin" class="page active">
        <div class="section">
            <h1>Access Control</h1>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="attemptLogin()">Authorize</button>
            <p style="text-align:center; font-size: 0.8rem; margin-top: 20px;">
                Kein Zugang? <a href="#" onclick="showPage('pageRegister')" style="color:var(--accent-color)">Registrieren</a>
            </p>
        </div>
    </div>

    <div id="pageRegister" class="page">
        <div class="section">
            <h1 id="regTitle">New Identity</h1>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button id="regBtn" onclick="register()">Create Account</button>
            <button onclick="showPage('pageLogin')" style="margin-top:10px; border-color:#555; color:#555;">Abbrechen</button>
        </div>
    </div>

    <div id="pageChats" class="page">
        <div class="section">
            <h1>Support Nachrichten</h1>
            <div id="chatList">Lade Tickets...</div>
            <button onclick="goBack()" style="margin-top:20px;">Zurück</button>
        </div>
    </div>

    <div id="pageChatView" class="page">
        <div class="section">
            <h2 id="chatWith">Chat</h2>
            <div id="chatMessages" class="chat-container"></div>
            <textarea id="chatInput" placeholder="Nachricht schreiben..."></textarea>
            <button onclick="sendMessage()">Senden</button>
            <button onclick="showPage('pageChats')" style="margin-top:10px; border-color:#555; color:#555;">Zurück</button>
        </div>
    </div>

    <div id="pageMain" class="page">
        <div class="section">
            <h2>System Status: Online</h2>
            <p>Willkommen im Mod-Zentrum.</p>
            <button onclick="showPage('pageChatView'); startNewTicket();">Neues Support-Ticket</button>
        </div>
    </div>

    <div id="pageAdmin" class="page">
        <div class="section">
            <h1>Admin Interface</h1>
            <div id="adminTicketList"></div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let tickets = JSON.parse(localStorage.getItem('tickets')) || [];
        let adminPass = localStorage.getItem('adminPass') || "1234";
        let currentUser = null;
        let activeTicketId = null;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'pageChats' || id === 'pageAdmin') renderLists();
        }

        function register() {
            const u = document.getElementById('regUser').value;
            const p = document.getElementById('regPass').value;
            
            // ADMIN PASSWORT ÄNDERN TRICK
            if(u.toLowerCase() === "admin" && !p) {
                const newPw = prompt("Neues Admin-Passwort festlegen:");
                if(newPw) {
                    localStorage.setItem('adminPass', newPw);
                    adminPass = newPw;
                    alert("Admin-Passwort aktualisiert!");
                }
                return;
            }

            if(!u || !p) return;
            users.push({name: u, pass: p, team: "Vulkan"});
            localStorage.setItem('users', JSON.stringify(users));
            alert("Erfolgreich registriert!");
            showPage('pageLogin');
        }

        function attemptLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;

            if(u === "Admin" && p === adminPass) {
                currentUser = {name: "Admin", isAdmin: true};
                loginSuccess("pageAdmin");
            } else {
                const found = users.find(user => user.name === u && user.pass === p);
                if(found) {
                    currentUser = {...found, isAdmin: false};
                    loginSuccess("pageMain");
                } else {
                    alert("Login fehlgeschlagen.");
                }
            }
        }

        function loginSuccess(targetPage) {
            showPage(targetPage);
            const trigger = document.getElementById('userProfile');
            trigger.innerText = currentUser.name.charAt(0).toUpperCase();
            trigger.style.display = "flex";
            document.getElementById('dropName').innerText = currentUser.name;
        }

        function startNewTicket() {
            const id = Date.now();
            const newT = {id: id, player: currentUser.name, messages: [], status: "Open", admin: ""};
            tickets.push(newT);
            activeTicketId = id;
            updateChatUI();
        }

        function renderLists() {
            const list = currentUser.isAdmin ? document.getElementById('adminTicketList') : document.getElementById('chatList');
            const myTickets = currentUser.isAdmin ? tickets : tickets.filter(t => t.player === currentUser.name);
            
            list.innerHTML = myTickets.length === 0 ? "Keine Chats vorhanden." : 
                myTickets.map(t => `
                    <div class="ticket-item" onclick="openChat(${t.id})">
                        <strong>Ticket #${t.id}</strong><br>
                        Spieler: ${t.player} | Status: ${t.status}
                    </div>
                `).join("");
        }

        function openChat(id) {
            activeTicketId = id;
            showPage('pageChatView');
            updateChatUI();
        }

        function updateChatUI() {
            const t = tickets.find(x => x.id === activeTicketId);
            document.getElementById('chatWith').innerText = "Chat mit " + (currentUser.isAdmin ? t.player : "Support");
            const box = document.getElementById('chatMessages');
            box.innerHTML = t.messages.map(m => `
                <div class="msg ${m.role === 'admin' ? 'msg-admin' : 'msg-player'}">
                    <strong>${m.sender}:</strong><br>${m.text}
                </div>
            `).join("");
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const txt = document.getElementById('chatInput').value;
            if(!txt) return;
            const t = tickets.find(x => x.id === activeTicketId);
            t.messages.push({
                sender: currentUser.name,
                role: currentUser.isAdmin ? 'admin' : 'player',
                text: txt
            });
            if(currentUser.isAdmin) {
                t.status = "In Bearbeitung";
                t.admin = currentUser.name;
            }
            localStorage.setItem('tickets', JSON.stringify(tickets));
            document.getElementById('chatInput').value = "";
            updateChatUI();
        }

        function toggleDropdown(e) { e.stopPropagation(); const d = document.getElementById('profileDropdown'); d.style.display = d.style.display === "block" ? "none" : "block"; }
        function closeDropdown() { document.getElementById('profileDropdown').style.display = "none"; }
        function logout() { location.reload(); }
        function goBack() { showPage(currentUser.isAdmin ? 'pageAdmin' : 'pageMain'); }
    </script>
</body>
</html>
